title = "DC Circuits unistructural MCQ 2"
solo_level_code = "UNISTRUCTURAL"
estimated_minutes = 1
difficulty = 3
question_text = "What is the equivalent resistance of three resistors (R1, R2, R3) connected in series?"
feedback = "In a series circuit, resistances add directly together."

[[concepts.questions.options]]
text = "Req = R1 + R2 + R3"
correct = true

[[concepts.questions.options]]
text = "1/Req = 1/R1 + 1/R2 + 1/R3"
correct = false

[[concepts.questions.options]]
text = "Req = (R1 * R2 * R3) / (R1 + R2 + R3)"
correct = false

[[concepts.questions.options]]
text = "Req = R1 * R2 + R3"
correct = false

[[concepts.questions]]
code = "Q087"
type = "ESSAY"
title = "DC Circuits unistructural Essay"
solo_level_code = "UNISTRUCTURAL"
estimated_minutes = 5
difficulty = 1
question_text = "Explain what defines a Direct Current (DC) circuit and state how equivalent resistance is calculated for series resistors."
reference_answer = "A Direct Current (DC) circuit is one in which electric current flows exclusively in a single direction. For resistors connected in series, the total equivalent resistance is simply the sum of individual resistances: Req = R1 + R2 + ... + Rn."
feedback = "Define unidirectional current flow and state the series equivalent resistance formula."

