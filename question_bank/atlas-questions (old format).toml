[[concepts.questions]]
code = "Q089"
type = "MCQ"
title = "DC Circuits multistructural MCQ 2"
solo_level_code = "MULTISTRUCTURAL"
estimated_minutes = 1
difficulty = 3
question_text = "Which statement correctly describes voltage drops and currents in parallel branches of a DC circuit?"
feedback = "Recall that components connected across the same two nodes share the same potential difference."

[[concepts.questions.options]]
text = "All parallel branches experience the same potential difference, while current divides among branches based on resistance."
correct = true

[[concepts.questions.options]]
text = "All parallel branches carry identical currents regardless of individual resistance."
correct = false

[[concepts.questions.options]]
text = "The potential difference drops sequentially across each parallel branch."
correct = false

[[concepts.questions.options]]
text = "Total equivalent resistance in parallel is always larger than any individual branch resistance."
correct = false

[[concepts.questions]]
code = "Q090"
type = "ESSAY"
title = "DC Circuits multistructural Essay"
solo_level_code = "MULTISTRUCTURAL"
estimated_minutes = 5
difficulty = 1
question_text = "Compare current and potential difference across resistors connected in series versus parallel configurations."
reference_answer = "In a series circuit, the same current flows through all components, while the total voltage is divided among them based on resistance. In a parallel circuit, all branches experience the exact same potential difference, while total current divides among branches inversely proportional to their resistances."
feedback = "Contrast how current behaves (same in series, divides in parallel) and how voltage behaves (divides in series, same in parallel)."

[[concepts.questions]]
code = "Q091"
type = "MCQ"
title = "DC Circuits relational MCQ 1"
solo_level_code = "RELATIONAL"
estimated_minutes = 1
question_text = "What happens to the total main-line current drawn from an ideal DC voltage source when an additional resistor is added in parallel to an existing circuit?"
feedback = "Adding a parallel path reduces overall equivalent resistance, so I_total = V / Req increases."

[[concepts.questions.options]]
text = "Total current increases because equivalent resistance decreases."
correct = true

[[concepts.questions.options]]
text = "Total current decreases because total resistance increases."
correct = false

[[concepts.questions.options]]
text = "Total current remains unchanged because voltage is constant."
correct = false

[[concepts.questions.options]]
text = "Total current drops to zero due to branch interference."
correct = false

[[concepts.questions]]
code = "Q092"
type = "MCQ"
title = "DC Circuits relational MCQ 2"
solo_level_code = "RELATIONAL"
estimated_minutes = 1
difficulty = 3
question_text = "A circuit consists of a 12 V battery connected to a 4 Ω resistor in series with a parallel combination of two 6 Ω resistors. What is the total current leaving the battery?"
feedback = "First find R_parallel = (6*6)/(6+6) = 3 Ω. Then R_total = 4 + 3 = 7 Ω. Current = 12 / 7 ≈ 1.71 A."

[[concepts.questions.options]]
text = "1.71 A"
correct = true

[[concepts.questions.options]]
text = "0.75 A"
correct = false

[[concepts.questions.options]]
text = "3.00 A"
correct = false

[[concepts.questions.options]]
text = "1.00 A"
correct = false

[[concepts.questions]]
code = "Q093"
type = "ESSAY"
title = "DC Circuits relational Essay"
solo_level_code = "RELATIONAL"
estimated_minutes = 5
difficulty = 1
question_text = "Analyze a combination circuit containing both series and parallel resistors. Explain step-by-step how to find the total power delivered by the DC source."
reference_answer = "1. Simplify the parallel branches into single equivalent resistances using 1/R_p = Σ(1/R_i).\n2. Add the resulting series resistances to find the circuit's total equivalent resistance (R_eq = R_series + R_p).\n3. Use Ohm's Law to determine total source current: I_total = V_source / R_eq.\n4. Calculate total power delivered using P = V_source * I_total (or P = V_source^2 / R_eq), which equals the sum of power dissipated across every individual resistor."
feedback = "Outline the reduction step for parallel groups, addition of series elements, calculation of total current, and final power formulation."
