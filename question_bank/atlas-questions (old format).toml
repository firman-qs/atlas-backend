difficulty = 1
question_text = "Explain the relationship between potential difference, current, and resistance in an ohmic material, and describe how its V-I characteristic graph looks."
reference_answer = "In an ohmic material, resistance remains constant regardless of applied voltage or current. Therefore, potential difference (V) and current (I) are directly proportional (V = IR). On a V-I graph, this produces a straight line through the origin where the slope corresponds to resistance (or 1/R depending on axes)."
feedback = "Describe the constancy of resistance, the direct proportionality of V and I, and the linear nature of the V-I plot."

