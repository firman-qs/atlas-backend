[[concepts.questions]]
code = "Q066"
type = "ESSAY"
title = "Electric Current relational Essay"
solo_level_code = "RELATIONAL"
estimated_minutes = 5
difficulty = 1
question_text = "Explain why electric current must be conserved at a circuit node, connecting this principle to charge conservation."
reference_answer = "Under steady-state conditions, electric charge cannot accumulate indefinitely at a single junction in a circuit. Because charge is fundamentally conserved, the net rate of charge entering a node must equal the net rate of charge leaving it, resulting in Kirchhoff's Current Law (ΣI_in = ΣI_out)."
feedback = "Connect the non-accumulation of steady charge at a junction directly to the principle of charge conservation and Kirchhoff's Current Law."


