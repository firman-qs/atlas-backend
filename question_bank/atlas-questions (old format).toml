[[concepts.questions]]
code = "Q084"
type = "ESSAY"
title = "Ohm's Law relational Essay"
solo_level_code = "RELATIONAL"
estimated_minutes = 5
difficulty = 1
question_text = "Analyze why real components like incandescent lamps deviate from linear Ohm's Law behavior, linking electrical power dissipation to microscopic material behavior."
reference_answer = "As current passes through a lamp filament, electrical power is converted to heat (P = I^2 * R). This heating raises the temperature of the metallic filament, causing metal ions to vibrate more violently. The increased lattice vibrations increase electron scattering, raising resistance. Because resistance changes with operating temperature, the V-I relationship becomes non-linear, violating constant-resistance Ohm's law."
feedback = "Connect power dissipation (P = I^2 R) to temperature rise, lattice vibrations, increased electron scattering, and non-constant resistance."


