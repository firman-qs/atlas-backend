solo_level_code = "UNISTRUCTURAL"
estimated_minutes = 5
difficulty = 1
question_text = "Define electric current and state its standard SI unit."
reference_answer = "Electric current is defined as the net rate of flow of electric charge through a conductor (I = ΔQ/Δt). Its standard SI unit is the Ampere (A), equivalent to one Coulomb per second."
feedback = "Ensure you explicitly mention charge flow per unit time and state the Ampere (A) as the SI unit."

