[[concepts.questions]]
code = "Q063"
type = "ESSAY"
title = "Electric Current multistructural Essay"
solo_level_code = "MULTISTRUCTURAL"
estimated_minutes = 5
difficulty = 1
question_text = "Describe how charge carriers move inside a metallic wire and contrast conventional current with actual electron drift."
reference_answer = "In a conductor, free electrons undergo rapid random thermal motion while drifting slowly against the applied electric field. Conventional current is defined in the direction positive charges would move (from higher to lower potential), which is opposite to the direction of real negative electron drift."
feedback = "Identify both the random thermal motion and net drift of electrons, and clearly state the directional difference between conventional current and electron motion."

