difficulty = 1
question_text = "Explain how potential difference drives electric current and describe the correct way to connect a voltmeter to measure it."
reference_answer = "Potential difference creates an electric field within a conductor, exerting forces on free charges that cause them to drift from high to low potential energy. A voltmeter must be connected in parallel across the component so it experiences the same potential difference, and it must have very high resistance to minimize drawn current."
feedback = "Address both mechanism (electric field creating charge movement) and practical measurement (parallel connection with high resistance)."

