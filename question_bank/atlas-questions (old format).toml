title = "Ohm's Law relational MCQ 2"
solo_level_code = "RELATIONAL"
estimated_minutes = 1
difficulty = 3
question_text = "Why does a filament light bulb violate strict linear Ohm's Law behavior as higher voltage is applied?"
feedback = "Connect electrical energy dissipation (Joule heating) to lattice vibrations and altered charge carrier scattering."

[[concepts.questions.options]]
text = "Increased current causes Joule heating, raising temperature and increasing lattice scattering, which increases resistance."
correct = true

[[concepts.questions.options]]
