[[questions]]
code = "Q091"
type = "MCQ"
title = "DC Circuits relational MCQ 1"
estimated_minutes = 1
question_text = "What happens to the total main-line current drawn from an ideal DC voltage source when an additional resistor is added in parallel to an existing circuit?"
feedback = "Adding a parallel path reduces overall equivalent resistance, so I_total = V / Req increases."

[[questions.concepts]]
code = "dc_circuits"
solo_level_code = "RELATIONAL"

[[questions.options]]
text = "Total current increases because equivalent resistance decreases."
correct = true

[[questions.options]]
text = "Total current decreases because total resistance increases."
correct = false

[[questions.options]]
text = "Total current remains unchanged because voltage is constant."
correct = false

[[questions.options]]
text = "Total current drops to zero due to branch interference."
correct = false

[[questions]]
code = "Q092"
type = "MCQ"
title = "DC Circuits relational MCQ 2"
estimated_minutes = 1
question_text = "A circuit consists of a 12 V battery connected to a 4 Ω resistor in series with a parallel combination of two 6 Ω resistors. What is the total current leaving the battery?"
feedback = "First find R_parallel = (6*6)/(6+6) = 3 Ω. Then R_total = 4 + 3 = 7 Ω. Current = 12 / 7 ≈ 1.71 A."

[[questions.concepts]]
code = "dc_circuits"
solo_level_code = "RELATIONAL"

[[questions.options]]
text = "1.71 A"
correct = true

[[questions.options]]
text = "0.75 A"
correct = false

[[questions.options]]
text = "3.00 A"
correct = false

[[questions.options]]
text = "1.00 A"
correct = false

