title = "DC Circuits multistructural MCQ 1"
estimated_minutes = 1
question_text = "What is the equivalent resistance when two 6 Ω resistors are connected in parallel?"
feedback = "Use 1/Req = 1/R1 + 1/R2 -> 1/Req = 1/6 + 1/6 = 2/6 = 1/3."

[[questions.concepts]]
code = "dc_circuits"
solo_level_code = "MULTISTRUCTURAL"

